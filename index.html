<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caderno Digital</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

header{
background:#1e293b;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

textarea{
width:100%;
height:400px;
padding:15px;
border-radius:10px;
border:none;
font-size:16px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.voltar{
background:#16a34a;
}

</style>
</head>

<body>

<header>

<h1 id="tituloMateria">Caderno</h1>

</header>

<div class="container">

<h2>Anotações da matéria</h2>

<textarea id="anotacoes" placeholder="Escreva aqui o que você estudou..."></textarea>

<br>

<button onclick="salvar()">💾 Salvar</button>

<button class="voltar" onclick="voltar()">⬅ Voltar para Mochila</button>

</div>

<script>

let params = new URLSearchParams(window.location.search);
let materia = params.get("materia");

document.getElementById("tituloMateria").innerText = "📚 " + materia;

/* CARREGAR ANOTAÇÕES */

let anotacaoSalva = localStorage.getItem("caderno_" + materia);

if(anotacaoSalva){
document.getElementById("anotacoes").value = anotacaoSalva;
}

/* SALVAR */

function salvar(){

let texto = document.getElementById("anotacoes").value;

localStorage.setItem("caderno_" + materia, texto);

alert("Anotações salvas!");

}

/* VOLTAR */

function voltar(){

window.location.href = "index.html";

}

</script>

</body>
  <!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#667eea,#764ba2);
}

header{
background:#1e293b;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
gap:20px;
}

.materia{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:0.3s;
}

.materia:hover{
transform:scale(1.05);
background:#e0e7ff;
}

.categoria{
margin-top:30px;
}

.categoria h2{
color:white;
margin-bottom:10px;
}

</style>

</head>

<body>

<header>
<h1>🎒 Mochila Escolar Técnica</h1>
<p>Clique em uma matéria para abrir o caderno</p>
</header>

<div class="container">

<!-- INFORMÁTICA / TÉCNICO -->

<div class="categoria">
<h2>💻 Informática / Técnico</h2>

<div class="grid">

<div class="materia" onclick="abrir('POO Java')">POO Java</div>

<div class="materia" onclick="abrir('Lógica de Programação')">Lógica de Programação</div>

<div class="materia" onclick="abrir('Programação Web')">Programação Web</div>

<div class="materia" onclick="abrir('Sistema Operacional')">Sistema Operacional</div>

<div class="materia" onclick="abrir('Noção de Robótica')">Noção de Robótica</div>

<div class="materia" onclick="abrir('AMC')">AMC</div>

</div>
</div>

<!-- ORGANIZAÇÃO / APOIO -->

<div class="categoria">
<h2>📊 Organização</h2>

<div class="grid">

<div class="materia" onclick="abrir('Gestão de Tempo')">Gestão de Tempo</div>

</div>
</div>

</div>

<script>

function abrir(materia){

// Redireciona para o seu caderno
window.location.href = "caderno.html?materia=" + encodeURIComponent(materia);

}

</script>

</body>
</html>
</html>
